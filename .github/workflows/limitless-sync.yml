name: LimitlessTCG Deck Sync

on:
  schedule:
    # 毎日 JST 04:30 (UTC 19:30) — 既存 pg_cron (19:00 UTC) の30分後
    - cron: "30 19 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger limitless-sync API
        run: |
          set -e
          if [ -z "${{ secrets.PRODUCTION_API_URL }}" ]; then
            echo "PRODUCTION_API_URL secret is not set"
            exit 1
          fi
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "X-Internal-Key: ${{ secrets.INTERNAL_API_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.PRODUCTION_API_URL }}/api/internal/limitless-sync")
          echo "HTTP $HTTP_CODE"
          cat /tmp/response.json
          if [ "$HTTP_CODE" -ne 200 ]; then
            exit 1
          fi
